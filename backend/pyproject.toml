[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "*/migrations/*",
    "manage.py",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "DJ"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"chronoq/settings/*.py" = ["F401", "F403", "F405"]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
  migrations
)/
'''

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "chronoq.settings.dev"
python_files = ["test_*.py", "*_test.py"]
addopts = "-ra --strict-markers"